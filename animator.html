<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050a18; font-family:'Segoe UI',sans-serif; overflow:hidden; width:100%; height:100vh; }
  #canvas { display:block; width:100%; height:100%; }
  #overlay {
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column; pointer-events:none;
  }
  #title-bar {
    padding:12px 18px; background:rgba(0,0,0,0.5);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(88,166,255,0.3);
    display:flex; align-items:center; gap:10px;
  }
  #title-text { color:#58a6ff; font-size:15px; font-weight:600; }
  #subtitle-text { color:#8b949e; font-size:11px; }
  #info-panel {
    position:absolute; bottom:0; left:0; right:0;
    padding:14px 18px; background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    border-top:1px solid rgba(88,166,255,0.2);
    color:#c9d1d9; font-size:12px; line-height:1.6;
  }
  #legend {
    position:absolute; top:60px; right:14px;
    background:rgba(0,0,0,0.6); border:1px solid rgba(88,166,255,0.2);
    border-radius:8px; padding:10px 14px;
    color:#c9d1d9; font-size:11px;
  }
  .legend-item { display:flex; align-items:center; gap:8px; margin:4px 0; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  #loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#58a6ff; font-size:18px; text-align:center;
  }
  .spin { animation: spin 1s linear infinite; display:inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div id="title-bar">
    <div>
      <div id="title-text">⚛️ PhysIQ Animator</div>
      <div id="subtitle-text">Loading animation...</div>
    </div>
  </div>
  <div id="legend"></div>
  <div id="info-panel">Initialising...</div>
</div>
<div id="loading"><span class="spin">⟳</span><br>Preparing animation...</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, animFrame, scene = null, t = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); });
resize();

// ── COLOUR PALETTE ─────────────────────────────────────────
const COLORS = {
  proton:   '#ff5555', neutron: '#aaaaaa', electron: '#4da6ff',
  nucleus:  '#ff6622', bond:    '#ffcc44', wave:     '#44ffaa',
  force:    '#ff44aa', energy:  '#ffff44', photon:   '#ffffff',
  positive: '#ff5555', negative:'#4da6ff', neutral:  '#aaaaaa',
  bg:       '#050a18', grid:    '#0d1f3c', accent:   '#58a6ff',
  text:     '#e6edf3', subtext: '#8b949e',
};

// ─── DRAWING HELPERS ───────────────────────────────────────
function drawGlow(x,y,r,color,alpha=0.3) {
  const g = ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  g.addColorStop(0, color.replace(')',`,${alpha})`).replace('rgb','rgba'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function drawCircle(x,y,r,color,stroke=null,lineWidth=2) {
  const rgb = hexToRgb(color);
  // glow
  const g = ctx.createRadialGradient(x,y,0,x,y,r*2);
  g.addColorStop(0,`rgba(${rgb},0.25)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2,0,Math.PI*2); ctx.fill();
  // fill
  const g2 = ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
  g2.addColorStop(0,`rgba(${rgb},1)`);
  g2.addColorStop(1,`rgba(${Math.max(0,parseInt(hex2r(color))-60)},${Math.max(0,parseInt(hex2g(color))-60)},${Math.max(0,parseInt(hex2b(color))-60)},1)`);
  ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lineWidth;ctx.stroke();}
}
function hex2r(h){return parseInt(h.slice(1,3),16)}
function hex2g(h){return parseInt(h.slice(3,5),16)}
function hex2b(h){return parseInt(h.slice(5,7),16)}

function drawLabel(x,y,text,color='#e6edf3',size=12,align='center') {
  ctx.font=`${size}px 'Segoe UI',sans-serif`;
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.7)';
  const m=ctx.measureText(text);
  ctx.fillRect(x-(align==='center'?m.width/2+4:0),y-size/2-2,m.width+8,size+4);
  ctx.fillStyle=color; ctx.fillText(text,x,y);
}

function drawArrow(x1,y1,x2,y2,color='#ff44aa',width=2) {
  const angle=Math.atan2(y2-y1,x2-x1);
  const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
  ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-14*Math.cos(angle-0.4),y2-14*Math.sin(angle-0.4));
  ctx.lineTo(x2-14*Math.cos(angle+0.4),y2-14*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fill();
}

function drawOrbit(cx,cy,rx,ry,color='rgba(88,166,255,0.25)',dashArr=[6,4]) {
  ctx.strokeStyle=color; ctx.lineWidth=1;
  ctx.setLineDash(dashArr);
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawGrid() {
  ctx.strokeStyle=COLORS.grid; ctx.lineWidth=0.5;
  const step=60;
  for(let x=0;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ════════════════════════════════════════════════════════════
// ANIMATION TYPES
// ════════════════════════════════════════════════════════════

// ── TYPE 1: ATOM ─────────────────────────────────────────────
function drawAtom(s) {
  const cx=W/2, cy=H*0.45;
  // nucleus
  const nr = s.nucleus_radius||35;
  const protons = s.protons||1;
  const neutrons = s.neutrons||0;
  // draw protons & neutrons in nucleus
  const total = protons+neutrons;
  const nrad = Math.min(nr, 8+total*3);
  for(let i=0;i<total;i++){
    const angle = (i/total)*Math.PI*2;
    const d = total>1 ? nrad*0.55 : 0;
    const nx = cx + d*Math.cos(angle);
    const ny = cy + d*Math.sin(angle);
    const col = i<protons ? COLORS.proton : COLORS.neutron;
    drawCircle(nx,ny, Math.max(6,nrad/Math.max(total,1)*1.2), col);
  }
  // nucleus glow
  const ng = ctx.createRadialGradient(cx,cy,0,cx,cy,nr);
  ng.addColorStop(0,'rgba(255,100,30,0.15)');
  ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(cx,cy,nr*2.5,0,Math.PI*2); ctx.fill();
  drawLabel(cx,cy+nr+16,'Nucleus',COLORS.text,11);

  // electrons and shells
  const shells = s.shells||[[1]];
  let shellR = nr+55;
  let legendItems = [];
  legendItems.push({color:COLORS.proton, label:`Proton (${protons})`});
  if(neutrons>0) legendItems.push({color:COLORS.neutron, label:`Neutron (${neutrons})`});

  shells.forEach((shell,si) => {
    const ecount = shell.length || shell;
    const ec = typeof ecount==='number' ? ecount : ecount.length;
    drawOrbit(cx,cy,shellR,shellR*0.55,'rgba(88,166,255,0.2)');
    // label shell
    drawLabel(cx+shellR,cy-shellR*0.55-12,`Shell ${si+1} (${ec}e⁻)`,COLORS.accent,10);

    for(let i=0;i<ec;i++){
      const angle = (i/ec)*Math.PI*2 + t*(0.6-si*0.15)*(si%2===0?1:-1);
      const ex = cx + shellR*Math.cos(angle);
      const ey = cy + shellR*0.55*Math.sin(angle);
      drawCircle(ex,ey,8,COLORS.electron);
      // charge symbol
      ctx.fillStyle='#ffffff'; ctx.font='bold 9px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('−',ex,ey);
    }
    shellR += 50;
  });
  legendItems.push({color:COLORS.electron, label:`Electron (${shells.flat().reduce((a,b)=>a+(typeof b==='number'?b:b.length||1),0)})`});
  updateLegend(legendItems);
}

// ── TYPE 2: MOLECULE ─────────────────────────────────────────
function drawMolecule(s) {
  const atoms = s.atoms||[];
  const bonds = s.bonds||[];
  const cx=W/2, cy=H/2;
  const scale = Math.min(W,H)*0.35;

  // Draw bonds first
  bonds.forEach(b => {
    const a1=atoms[b.from], a2=atoms[b.to];
    if(!a1||!a2) return;
    const x1=cx+a1.x*scale, y1=cy+a1.y*scale;
    const x2=cx+a2.x*scale, y2=cy+a2.y*scale;
    const order = b.order||1;
    const angle = Math.atan2(y2-y1,x2-x1);
    const perp = angle+Math.PI/2;
    const offsets = order===1?[0]: order===2?[-5,5]:[-9,0,9];
    offsets.forEach(off => {
      ctx.strokeStyle=COLORS.bond; ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(x1+off*Math.cos(perp),y1+off*Math.sin(perp));
      ctx.lineTo(x2+off*Math.cos(perp),y2+off*Math.sin(perp));
      ctx.stroke();
    });
    // bond label
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const btype = order===1?'Single':order===2?'Double':'Triple';
    drawLabel(mx,my-14,`${btype} Bond`,COLORS.bond,9);
  });

  // Draw atoms
  atoms.forEach((a,i) => {
    const x=cx+a.x*scale, y=cy+a.y*scale;
    const r = a.radius||22;
    const col = a.color||(a.symbol==='H'?'#4da6ff':a.symbol==='O'?'#ff5555':a.symbol==='C'?'#888888':a.symbol==='N'?'#44aaff':'#88ff88');
    drawCircle(x,y,r,col);
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.max(11,r*0.7)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(a.symbol||'?',x,y);
    if(a.label) drawLabel(x,y+r+14,a.label,COLORS.subtext,10);
  });
}

// ── TYPE 3: WAVE ─────────────────────────────────────────────
function drawWave(s) {
  const waves = s.waves||[{color:'#44ffaa',amplitude:60,wavelength:120,speed:0.03,label:'Wave',y_offset:0}];
  const cy=H/2;
  ctx.lineWidth=2.5;
  waves.forEach((w,wi) => {
    const yBase = cy + (w.y_offset||0)*H*0.15;
    ctx.strokeStyle=w.color||COLORS.wave;
    ctx.beginPath();
    let first=true;
    for(let x=0;x<W;x+=2){
      const y = yBase + (w.amplitude||60)*Math.sin(2*Math.PI*x/(w.wavelength||120) - t*(w.speed||0.03)*60);
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // labels
    drawLabel(80,yBase-(w.amplitude||60)-20,w.label||'Wave',w.color||COLORS.wave,12);
    // wavelength arrow
    if(w.show_wavelength!==false){
      const wl=w.wavelength||120;
      const xa=W/4, xb=W/4+wl;
      drawArrow(xa,yBase+90,xb,yBase+90,w.color||COLORS.wave,1.5);
      drawArrow(xb,yBase+90,xa,yBase+90,w.color||COLORS.wave,1.5);
      drawLabel((xa+xb)/2,yBase+106,'λ (wavelength)',w.color||COLORS.wave,10);
    }
    // amplitude arrow
    drawArrow(W*0.7,yBase,W*0.7,yBase-(w.amplitude||60),COLORS.force,1.5);
    drawLabel(W*0.7+40,yBase-(w.amplitude||60)/2,'A (amplitude)',COLORS.force,10,'left');
  });
}

// ── TYPE 4: CIRCUIT ──────────────────────────────────────────
function drawCircuit(s) {
  const nodes = s.nodes||[];
  const wires = s.wires||[];
  const components = s.components||[];
  const cx=W/2, cy=H/2;
  const scale = Math.min(W,H)*0.35;

  // Draw wires with animated electrons
  wires.forEach(w => {
    const n1=nodes[w.from], n2=nodes[w.to];
    if(!n1||!n2) return;
    const x1=cx+n1.x*scale, y1=cy+n1.y*scale;
    const x2=cx+n2.x*scale, y2=cy+n2.y*scale;
    ctx.strokeStyle='#cccccc'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // animate electrons along wire
    const numE=3;
    for(let i=0;i<numE;i++){
      const frac=((t*(w.speed||0.02)+i/numE)%1);
      const ex=x1+(x2-x1)*frac, ey=y1+(y2-y1)*frac;
      drawCircle(ex,ey,5,COLORS.electron);
    }
  });

  // Draw components
  components.forEach(c => {
    const x=cx+c.x*scale, y=cy+c.y*scale;
    if(c.type==='battery'){
      ctx.strokeStyle='#ffcc44'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(x-20,y); ctx.lineTo(x+20,y); ctx.stroke();
      ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(x-8,y-12); ctx.lineTo(x-8,y+12); ctx.stroke();
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+8,y-7); ctx.lineTo(x+8,y+7); ctx.stroke();
      drawLabel(x,y-20,c.label||`${c.voltage||9}V Battery`,COLORS.text,10);
    } else if(c.type==='resistor'){
      ctx.strokeStyle='#ff8844'; ctx.lineWidth=2.5;
      ctx.strokeRect(x-18,y-10,36,20);
      drawLabel(x,y+22,c.label||`${c.resistance||'?'}Ω`,COLORS.text,10);
    } else if(c.type==='bulb'){
      const glow = 0.5+0.5*Math.sin(t*3);
      drawCircle(x,y,15,'#ffee44');
      ctx.globalAlpha=glow*0.5;
      drawCircle(x,y,25,'#ffee44');
      ctx.globalAlpha=1;
      drawLabel(x,y+28,c.label||'Bulb',COLORS.text,10);
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const x=cx+n.x*scale, y=cy+n.y*scale;
    drawCircle(x,y,5,'#cccccc');
  });
}

// ── TYPE 5: FORCES ───────────────────────────────────────────
function drawForces(s) {
  const obj = s.object||{x:0.5,y:0.5,label:'Object',mass:'m'};
  const forces = s.forces||[];
  const cx=W*obj.x, cy=H*obj.y;
  const objR=30;
  // draw object
  drawCircle(cx,cy,objR,'#3388ff');
  drawLabel(cx,cy,obj.label||'m',COLORS.text,13);
  // draw forces
  forces.forEach(f => {
    const len=(f.magnitude||80)*(0.8+0.2*Math.sin(t*2));
    const rad=f.angle*Math.PI/180;
    const ex=cx+len*Math.cos(rad), ey=cy+len*Math.sin(rad);
    drawArrow(cx,cy,ex,ey,f.color||COLORS.force,3);
    drawLabel(ex,ey,f.label||'F',f.color||COLORS.force,12);
    drawLabel((cx+ex)/2,(cy+ey)/2+16,f.value||'',COLORS.subtext,10);
  });
}

// ── TYPE 6: THERMODYNAMICS ───────────────────────────────────
function drawThermo(s) {
  const cx=W/2, cy=H/2;
  const particles = s._particles = s._particles||[];
  const numP = s.num_particles||30;
  const temp = s.temperature||300;
  const speed_factor = temp/300;
  // init particles
  if(particles.length===0){
    const cW=W*0.5, cH=H*0.5;
    for(let i=0;i<numP;i++){
      particles.push({
        x:cx-cW/2+Math.random()*cW,
        y:cy-cH/2+Math.random()*cH,
        vx:(Math.random()-0.5)*4*speed_factor,
        vy:(Math.random()-0.5)*4*speed_factor,
        r:4+Math.random()*3,
      });
    }
  }
  // container
  ctx.strokeStyle=COLORS.accent; ctx.lineWidth=2;
  ctx.strokeRect(cx-W*0.25,cy-H*0.25,W*0.5,H*0.5);
  // update & draw particles
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<cx-W*0.25+p.r||p.x>cx+W*0.25-p.r) p.vx*=-1;
    if(p.y<cy-H*0.25+p.r||p.y>cy+H*0.25-p.r) p.vy*=-1;
    const speed=Math.sqrt(p.vx**2+p.vy**2);
    const hue=Math.min(240,240-speed*15);
    ctx.fillStyle=`hsl(${hue},100%,60%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  drawLabel(cx,cy-H*0.25-22,s.label||`Gas particles at T=${temp}K`,COLORS.accent,13);
  drawLabel(cx,cy+H*0.25+22,`Pressure: ${s.pressure||'P'} | Volume: ${s.volume||'V'} | n=${s.moles||'n'}mol`,COLORS.text,11);
}

// ── TYPE 7: PROJECTILE ───────────────────────────────────────
function drawProjectile(s) {
  const g=s.gravity||9.8, v0=s.initial_velocity||20, angle=(s.angle||45)*Math.PI/180;
  const scale=Math.min(W,H)/30;
  const tMax=2*v0*Math.sin(angle)/g;
  const range=v0**2*Math.sin(2*angle)/g;
  const maxH=v0**2*Math.sin(angle)**2/(2*g);
  const originX=60, originY=H-80;
  // ground
  ctx.strokeStyle='#44aa44'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,originY); ctx.lineTo(W,originY); ctx.stroke();
  // trajectory path (dashed)
  ctx.setLineDash([5,5]); ctx.strokeStyle='rgba(255,204,68,0.4)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let tt=0;tt<=tMax;tt+=0.05){
    const x=originX+(v0*Math.cos(angle)*tt)*scale;
    const y=originY-(v0*Math.sin(angle)*tt-0.5*g*tt**2)*scale;
    if(tt===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);
  // current position of projectile
  const tNow=(t*0.8)%tMax;
  const px=originX+(v0*Math.cos(angle)*tNow)*scale;
  const py=originY-(v0*Math.sin(angle)*tNow-0.5*g*tNow**2)*scale;
  drawCircle(px,py,12,COLORS.proton);
  // velocity arrows
  const vx=v0*Math.cos(angle)*scale*0.15;
  const vy=-(v0*Math.sin(angle)-g*tNow)*scale*0.15;
  drawArrow(px,py,px+vx*3,py,'#ff8844',2);
  drawArrow(px,py,px,py+vy*3,'#4488ff',2);
  drawLabel(px+vx*3+10,py,'vₓ','#ff8844',10,'left');
  drawLabel(px+10,py+vy*3,'vᵧ','#4488ff',10,'left');
  // stats
  drawLabel(W/2,50,`Range: ${range.toFixed(1)}m | Max Height: ${maxH.toFixed(1)}m | Time of flight: ${tMax.toFixed(1)}s`,COLORS.text,11);
  drawLabel(W/2,70,`v₀=${v0}m/s | θ=${s.angle||45}° | g=${g}m/s²`,COLORS.subtext,10);
}

// ── TYPE 8: LIGHT / REFRACTION ───────────────────────────────
function drawLight(s) {
  const cx=W/2, cy=H/2;
  const n1=s.n1||1.0, n2=s.n2||1.5;
  const incidentAngle=(s.incident_angle||45)*Math.PI/180;
  const refractAngle=Math.asin(n1*Math.sin(incidentAngle)/n2);
  const critAngle=n1<n2?Math.asin(n1/n2)*180/Math.PI:null;
  // interface
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2;
  ctx.setLineDash([10,5]);
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.setLineDash([]);
  // normal
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(cx,cy-150); ctx.lineTo(cx,cy+150); ctx.stroke();
  ctx.setLineDash([]);
  // incident ray
  const iLen=160;
  drawArrow(cx-iLen*Math.sin(incidentAngle),cy-iLen*Math.cos(incidentAngle),cx,cy,'#ffff44',2.5);
  // refracted ray
  drawArrow(cx,cy,cx+iLen*Math.sin(refractAngle)*1.2,cy+iLen*Math.cos(refractAngle)*1.2,'#44ffaa',2.5);
  // reflected ray
  drawArrow(cx,cy,cx+iLen*Math.sin(incidentAngle),cy-iLen*Math.cos(incidentAngle),'rgba(255,255,68,0.4)',1.5);
  // labels
  drawLabel(cx-iLen*Math.sin(incidentAngle)-40,cy-iLen*Math.cos(incidentAngle),'Incident ray','#ffff44',11,'right');
  drawLabel(cx+iLen*Math.sin(refractAngle)*1.2+10,cy+iLen*Math.cos(refractAngle)*1.2,'Refracted ray','#44ffaa',11,'left');
  drawLabel(cx+60,cy-70,`n₁ = ${n1}`,COLORS.text,12,'left');
  drawLabel(cx+60,cy+70,`n₂ = ${n2}`,COLORS.text,12,'left');
  drawLabel(cx-70,cy-50,`θ₁=${(s.incident_angle||45).toFixed(0)}°`,COLORS.accent,11,'right');
  drawLabel(cx-70,cy+50,`θ₂=${(refractAngle*180/Math.PI).toFixed(1)}°`,COLORS.accent,11,'right');
  if(critAngle) drawLabel(cx,cy-170,`Critical angle = ${critAngle.toFixed(1)}°`,COLORS.wave,11);
  // medium labels
  drawLabel(W*0.15,cy-30,`Medium 1 (n=${n1})`,COLORS.subtext,10);
  drawLabel(W*0.15,cy+30,`Medium 2 (n=${n2})`,COLORS.subtext,10);
  // Snell's law
  drawLabel(W*0.82,cy-20,`Snell's Law:`,COLORS.accent,10);
  drawLabel(W*0.82,cy,`n₁sinθ₁ = n₂sinθ₂`,COLORS.text,10);
}

// ── TYPE 9: ELECTROMAGNETIC ──────────────────────────────────
function drawEM(s) {
  const cx=W/2, cy=H/2;
  const rows=s.rows||3;
  const cols=s.cols||5;
  const spacing=Math.min(W/(cols+1),H/(rows+2));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=cx+(c-(cols-1)/2)*spacing;
      const y=cy+(r-(rows-1)/2)*spacing;
      const charge = s.charge_pattern==='alternating'?((r+c)%2===0?1:-1):(s.uniform_charge||1);
      const col=charge>0?COLORS.positive:COLORS.negative;
      drawCircle(x,y,spacing*0.18,col);
      ctx.fillStyle='#ffffff'; ctx.font=`bold ${spacing*0.15}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(charge>0?'+':'−',x,y);
      // field lines
      const numLines=4;
      for(let i=0;i<numLines;i++){
        const ang=(i/numLines)*Math.PI*2 + t*0.2*charge;
        const dx=Math.cos(ang)*spacing*0.45;
        const dy=Math.sin(ang)*spacing*0.45;
        ctx.strokeStyle=charge>0?'rgba(255,85,85,0.5)':'rgba(77,166,255,0.5)';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(x+Math.cos(ang)*spacing*0.2,y+Math.sin(ang)*spacing*0.2);
        ctx.lineTo(x+dx,y+dy);
        ctx.stroke();
      }
    }
  }
  drawLabel(cx,cy-rows/2*spacing-40,s.label||'Electric Field',COLORS.accent,14);
}

// ── TYPE 10: CHEMICAL REACTION ───────────────────────────────
function drawReaction(s) {
  const reactants=s.reactants||[];
  const products=s.products||[];
  const cx=W/2, cy=H/2;
  const phase=Math.sin(t*0.8)*0.5+0.5; // 0=reactants, 1=products
  const showProducts=phase>0.5;
  const alpha=showProducts?(phase-0.5)*2:1-(phase*2);

  ctx.globalAlpha=showProducts?1-alpha:alpha;
  reactants.forEach((r,i)=>{
    const x=cx-(reactants.length-1)*70/2+i*70-100;
    const col=r.color||COLORS.proton;
    drawCircle(x,cy,25,col);
    ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(r.symbol||r.formula||'?',x,cy);
    drawLabel(x,cy+38,r.formula||r.symbol||'?',col,11);
    if(i<reactants.length-1){
      drawLabel(x+55,cy,'+',COLORS.text,18);
    }
  });
  ctx.globalAlpha=1;

  // arrow
  ctx.strokeStyle=COLORS.wave; ctx.lineWidth=2;
  drawArrow(cx-20,cy,cx+20,cy,COLORS.wave,2.5);
  if(s.catalyst) drawLabel(cx,cy-20,s.catalyst,COLORS.wave,10);
  if(s.conditions) drawLabel(cx,cy+20,s.conditions,COLORS.subtext,9);

  ctx.globalAlpha=showProducts?alpha:1-alpha;
  products.forEach((p,i)=>{
    const x=cx+(products.length-1)*70/2-i*70+100;
    const col=p.color||COLORS.electron;
    drawCircle(x,cy,25,col);
    ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.symbol||p.formula||'?',x,cy);
    drawLabel(x,cy+38,p.formula||p.symbol||'?',col,11);
    if(i<products.length-1){
      drawLabel(x-55,cy,'+',COLORS.text,18);
    }
  });
  ctx.globalAlpha=1;

  drawLabel(cx,50,s.equation||'',COLORS.text,13);
  drawLabel(cx,H-100,showProducts?'→ Products forming':'← Reactants',showProducts?COLORS.electron:COLORS.proton,12);
}

// ── TYPE 11: PENDULUM ────────────────────────────────────────
function drawPendulum(s) {
  const pivot={x:W/2,y:80};
  const L=(s.length||200)*Math.min(W,H)/600;
  const amp=(s.amplitude||30)*Math.PI/180;
  const omega=Math.sqrt(9.8/((s.length||200)/100));
  const angle=amp*Math.cos(omega*t*0.5);
  const bx=pivot.x+L*Math.sin(angle);
  const by=pivot.y+L*Math.cos(angle);
  // rod
  ctx.strokeStyle='#aaaaaa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(pivot.x,pivot.y); ctx.lineTo(bx,by); ctx.stroke();
  // pivot
  drawCircle(pivot.x,pivot.y,8,'#888888');
  // bob
  drawCircle(bx,by,18,COLORS.proton);
  drawLabel(bx,by+30,'m',COLORS.text,11);
  // arc
  ctx.strokeStyle='rgba(255,255,68,0.2)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(pivot.x,pivot.y,L,-amp-Math.PI/2,amp-Math.PI/2); ctx.stroke();
  ctx.setLineDash([]);
  // formula
  drawLabel(W*0.2,H-60,`T = 2π√(L/g) = ${(2*Math.PI/omega).toFixed(2)}s`,COLORS.accent,11);
  drawLabel(W*0.2,H-40,`L=${s.length||200}cm | θ=${(s.amplitude||30)}°`,COLORS.text,10);
}

// ── TYPE 12: SPRING SHM ─────────────────────────────────────
function drawSpring(s) {
  const cx=W/2, cy=H/2;
  const k=s.spring_constant||10;
  const m=s.mass||1;
  const omega=Math.sqrt(k/m);
  const amp=(s.amplitude||80);
  const x0=cx+amp*Math.cos(omega*t*0.5);
  // wall
  ctx.fillStyle='#666666';
  ctx.fillRect(W*0.15-10,cy-60,10,120);
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  for(let i=0;i<6;i++){
    ctx.beginPath(); ctx.moveTo(W*0.15-10,cy-60+i*20); ctx.lineTo(W*0.15-25,cy-60+i*20+10); ctx.stroke();
  }
  // spring
  const wallX=W*0.15, coils=10;
  const coilW=40;
  ctx.strokeStyle='#aaaaaa'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(wallX,cy);
  const springLen=x0-wallX;
  for(let i=0;i<=coils;i++){
    const sx=wallX+springLen*(i/coils);
    const sy=cy+(i%2===0?-coilW:coilW)*0.4;
    if(i===0) ctx.lineTo(sx,cy);
    ctx.lineTo(sx,sy);
    if(i===coils) ctx.lineTo(x0,cy);
  }
  ctx.stroke();
  // mass block
  ctx.fillStyle='#3388ff';
  ctx.fillRect(x0,cy-25,50,50);
  drawLabel(x0+25,cy,'m',COLORS.text,13);
  // equilibrium line
  ctx.strokeStyle='rgba(255,255,68,0.3)'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(cx,cy-80); ctx.lineTo(cx,cy+80); ctx.stroke();
  ctx.setLineDash([]);
  drawLabel(cx,cy-90,'Equilibrium',COLORS.accent,10);
  drawLabel(W*0.5,H-60,`ω = √(k/m) = ${omega.toFixed(1)} rad/s | T = ${(2*Math.PI/omega).toFixed(2)}s`,COLORS.accent,11);
  drawLabel(W*0.5,H-40,`k=${k}N/m | m=${m}kg | A=${amp/80}m`,COLORS.text,10);
}

// ════════════════════════════════════════════════════════════
// RENDERER
// ════════════════════════════════════════════════════════════
function render() {
  ctx.fillStyle=COLORS.bg;
  ctx.fillRect(0,0,W,H);
  drawGrid();
  if(!scene){t=0;animFrame=requestAnimationFrame(render);return;}

  t+=0.016;

  try {
    switch(scene.type){
      case 'atom':        drawAtom(scene);        break;
      case 'molecule':    drawMolecule(scene);     break;
      case 'wave':        drawWave(scene);         break;
      case 'circuit':     drawCircuit(scene);      break;
      case 'forces':      drawForces(scene);       break;
      case 'thermodynamics': drawThermo(scene);    break;
      case 'projectile':  drawProjectile(scene);   break;
      case 'light':       drawLight(scene);        break;
      case 'electromagnetic': drawEM(scene);       break;
      case 'reaction':    drawReaction(scene);     break;
      case 'pendulum':    drawPendulum(scene);     break;
      case 'spring':      drawSpring(scene);       break;
      default: drawLabel(W/2,H/2,'Unknown animation type',COLORS.text,16);
    }
  } catch(e){ console.error(e); }

  animFrame=requestAnimationFrame(render);
}

function updateLegend(items=[]) {
  const leg=document.getElementById('legend');
  if(!items||!items.length){leg.style.display='none';return;}
  leg.style.display='block';
  leg.innerHTML='<div style="color:#8b949e;font-size:10px;margin-bottom:6px;font-weight:600;letter-spacing:1px">LEGEND</div>'+
    items.map(it=>`<div class="legend-item"><div class="legend-dot" style="background:${it.color}"></div><span>${it.label}</span></div>`).join('');
}

// ── RECEIVE DATA FROM STREAMLIT ────────────────────────────
window.addEventListener('message', function(e) {
  if(e.data && e.data.type==='animation_data') {
    const data = e.data.payload;
    scene = data;
    t = 0;
    if(scene && scene._particles) delete scene._particles;
    document.getElementById('loading').style.display='none';
    document.getElementById('subtitle-text').textContent = scene.subtitle||scene.type||'Animation';
    document.getElementById('info-panel').textContent = scene.info_text||'';
    if(scene.legend) updateLegend(scene.legend);
  }
});

// ── START ──────────────────────────────────────────────────
render();

// Also listen for URL-encoded data (iframe src)
const params=new URLSearchParams(window.location.search);
if(params.get('data')){
  try{
    scene=JSON.parse(decodeURIComponent(params.get('data')));
    document.getElementById('loading').style.display='none';
    document.getElementById('subtitle-text').textContent=scene.subtitle||scene.type||'Animation';
    document.getElementById('info-panel').textContent=scene.info_text||'';
    if(scene.legend) updateLegend(scene.legend);
  }catch(e){console.error('Parse error',e);}
}
</script>
